[build]
  base      = ""
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect toutes les routes vers index.html (SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache long pour les assets hashés
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
